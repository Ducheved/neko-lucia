name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.23.1
          - 24.18.0
          - 26.x
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Assert fresh outputs
        shell: bash
        run: test -z "$(find packages -type d \( -name dist -o -name .test-dist \) -print -quit)"

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.14.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Audit runtime dependencies
        run: pnpm audit --prod

  postgresql:
    name: PostgreSQL ${{ matrix.version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "16.14"
            image: postgres:16.14-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
            node: 22.23.1
          - version: "18.4"
            image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
            node: 24.18.0
    services:
      postgres:
        image: ${{ matrix.image }}
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: neko_lucia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neko_lucia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_DATABASE_URL: postgres://postgres:test@127.0.0.1:5432/neko_lucia_test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.14.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test PostgreSQL adapter
        run: pnpm --filter @ducheved/neko-lucia run build && pnpm --filter @ducheved/neko-lucia-adapter-drizzle run typecheck && pnpm --filter @ducheved/neko-lucia-adapter-drizzle run test

  mysql:
    name: MySQL 8.4.6
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4.6@sha256:869218921e61d6c3c89820955d63cca42971f0e3e6c1e2792247bbd944ebc6e9
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: neko_lucia_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -uroot -ptest --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: test
      MYSQL_DATABASE: neko_lucia_test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.14.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26.x
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test MySQL adapter
        run: pnpm --filter @ducheved/neko-lucia run build && pnpm --filter @ducheved/neko-lucia-adapter-drizzle run typecheck && pnpm --filter @ducheved/neko-lucia-adapter-drizzle run test

  secrets:
    name: Secrets
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan working tree and history
        shell: bash
        run: |
          IMAGE="zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f"
          docker run --rm -v "$PWD:/repo" -w /repo "$IMAGE" dir . --config=.gitleaks.toml --redact=100 --no-banner
          docker run --rm -v "$PWD:/repo" -w /repo "$IMAGE" git . --config=.gitleaks.toml --redact=100 --no-banner

  package-consumers:
    name: Package consumers
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Assert fresh outputs
        shell: bash
        run: test -z "$(find packages -type d \( -name dist -o -name .test-dist \) -print -quit)"

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.14.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26.x
          cache: pnpm

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed
        with:
          deno-version: v2.9.3

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify source
        run: pnpm lint && pnpm verify && pnpm test:deno

      - name: Reject explicit any
        shell: bash
        run: |
          if rg -n '\bany\b|as[[:space:]]+any|<any>' packages --glob '**/src/**/*.ts'; then
            exit 1
          fi

      - name: Reject code comments
        shell: bash
        run: |
          mapfile -t FILES < <(rg --files packages tests --glob '*.ts' --glob '*.js' --glob '*.mjs' --glob '!**/dist/**' --glob '!**/.test-dist/**')
          node --input-type=module - "${FILES[@]}" <<'NODE'
          import { readFile } from "node:fs/promises";
          import { LanguageVariant, SyntaxKind } from "typescript/unstable/ast";
          import { createScanner } from "typescript/unstable/ast/scanner";

          let failed = false;
          for (const path of process.argv.slice(2)) {
            const source = await readFile(path, "utf8");
            const scanner = createScanner(false, LanguageVariant.Standard, source);
            for (let token = scanner.scan(); token !== SyntaxKind.EndOfFile; token = scanner.scan()) {
              if (token === SyntaxKind.SingleLineCommentTrivia || token === SyntaxKind.MultiLineCommentTrivia) {
                const line = source.slice(0, scanner.getTokenStart()).split("\n").length;
                process.stderr.write(`${path}:${line}: code comments are not allowed\n`);
                failed = true;
              }
            }
          }
          if (failed) process.exit(1);
          NODE

      - name: Resolve automatic patch version
        shell: bash
        run: |
          mkdir -p artifacts
          FLOOR_VERSION=$(node -p "require('./package.json').version")
          CORE_VERSION=$(node -p "require('./packages/lucia/package.json').version")
          ADAPTER_VERSION=$(node -p "require('./packages/adapter-drizzle/package.json').version")
          ADAPTER_CORE_PEER=$(node -p "require('./packages/adapter-drizzle/package.json').peerDependencies['@ducheved/neko-lucia']")
          test "$FLOOR_VERSION" = "$CORE_VERSION"
          test "$FLOOR_VERSION" = "$ADAPTER_VERSION"
          test "$FLOOR_VERSION" = "$ADAPTER_CORE_PEER"
          PATCH_OFFSET=0
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            BASE_SHA=""
            while IFS= read -r CANDIDATE_SHA; do
              CANDIDATE_VERSION=$(git show "$CANDIDATE_SHA:package.json" | node -p "JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version")
              if [ "$CANDIDATE_VERSION" != "$FLOOR_VERSION" ]; then
                break
              fi
              BASE_SHA="$CANDIDATE_SHA"
            done < <(git rev-list --first-parent HEAD)
            test -n "$BASE_SHA"
            PATCH_OFFSET=$(git rev-list --first-parent --count "$BASE_SHA..HEAD")
          fi
          RELEASE_VERSION=$(FLOOR_VERSION="$FLOOR_VERSION" PATCH_OFFSET="$PATCH_OFFSET" node --input-type=module <<'NODE'
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(process.env.FLOOR_VERSION);
          if (match === null || Number(match[3]) !== 0) throw new Error("release train version must be x.y.0");
          process.stdout.write(`${match[1]}.${match[2]}.${process.env.PATCH_OFFSET}`);
          NODE
          )
          RELEASE_VERSION="$RELEASE_VERSION" node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";

          const corePath = "packages/lucia/package.json";
          const adapterPath = "packages/adapter-drizzle/package.json";
          const core = JSON.parse(await readFile(corePath, "utf8"));
          const adapter = JSON.parse(await readFile(adapterPath, "utf8"));
          core.version = process.env.RELEASE_VERSION;
          adapter.version = process.env.RELEASE_VERSION;
          adapter.peerDependencies["@ducheved/neko-lucia"] = process.env.RELEASE_VERSION;
          await writeFile(corePath, JSON.stringify(core, null, "\t") + "\n");
          await writeFile(adapterPath, JSON.stringify(adapter, null, "\t") + "\n");
          await writeFile("artifacts/release.json", JSON.stringify({
            version: process.env.RELEASE_VERSION,
            sha: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID
          }, null, 2) + "\n");
          NODE

      - name: Pack exact artifacts
        shell: bash
        run: |
          npx --yes npm@12.0.1 pack ./packages/lucia --ignore-scripts --json --pack-destination artifacts > artifacts/core-pack.raw.json
          npx --yes npm@12.0.1 pack ./packages/adapter-drizzle --ignore-scripts --json --pack-destination artifacts > artifacts/adapter-pack.raw.json
          normalize_pack() {
            SOURCE="$1" TARGET="$2" node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";

          const parsed = JSON.parse(await readFile(process.env.SOURCE, "utf8"));
          const candidates = Array.isArray(parsed) ? parsed : parsed.name === undefined ? Object.values(parsed) : [parsed];
          if (candidates.length !== 1) throw new Error(`unexpected npm pack result: ${candidates.length}`);
          await writeFile(process.env.TARGET, JSON.stringify(candidates[0], null, 2));
          NODE
          }
          normalize_pack artifacts/core-pack.raw.json artifacts/core-pack.json
          normalize_pack artifacts/adapter-pack.raw.json artifacts/adapter-pack.json
          rm artifacts/core-pack.raw.json artifacts/adapter-pack.raw.json

      - name: Verify pack manifests
        shell: bash
        run: |
          CORE_TGZ=$(node -p "require('./artifacts/core-pack.json').filename")
          ADAPTER_TGZ=$(node -p "require('./artifacts/adapter-pack.json').filename")
          mkdir "$RUNNER_TEMP/core-pack" "$RUNNER_TEMP/adapter-pack"
          tar -xzf "./artifacts/$CORE_TGZ" -C "$RUNNER_TEMP/core-pack"
          tar -xzf "./artifacts/$ADAPTER_TGZ" -C "$RUNNER_TEMP/adapter-pack"
          CORE_MANIFEST="$RUNNER_TEMP/core-pack/package/package.json" ADAPTER_MANIFEST="$RUNNER_TEMP/adapter-pack/package/package.json" node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";

          const coreManifest = JSON.parse(await readFile(process.env.CORE_MANIFEST, "utf8"));
          const adapterManifest = JSON.parse(await readFile(process.env.ADAPTER_MANIFEST, "utf8"));
          if (coreManifest.name !== "@ducheved/neko-lucia") throw new Error("invalid packed core name");
          if (adapterManifest.name !== "@ducheved/neko-lucia-adapter-drizzle") throw new Error("invalid packed adapter name");
          if (coreManifest.version !== adapterManifest.version) throw new Error("packed versions are not coupled");
          if (adapterManifest.peerDependencies["@ducheved/neko-lucia"] !== coreManifest.version) throw new Error("invalid packed core peer");
          if (adapterManifest.peerDependencies["drizzle-orm"] !== "0.45.2") throw new Error("invalid packed Drizzle peer");
          for (const [path, expectedName] of [["artifacts/core-pack.json", coreManifest.name], ["artifacts/adapter-pack.json", adapterManifest.name]]) {
            const pack = JSON.parse(await readFile(path, "utf8"));
            const files = new Set(pack.files.map((file) => file.path));
            for (const required of ["package.json", "README.md", "LICENSE", "NOTICE", "dist/index.js", "dist/index.d.ts"]) {
              if (!files.has(required)) throw new Error(`${expectedName} missing ${required}`);
            }
            for (const file of files) {
              if (!/^(package\.json|README\.md|LICENSE|NOTICE|dist\/.+\.(js|d\.ts))$/.test(file)) throw new Error(`${expectedName} unexpected file ${file}`);
            }
            if (pack.name !== expectedName || typeof pack.integrity !== "string" || typeof pack.filename !== "string") throw new Error(`${expectedName} invalid pack metadata`);
          }
          NODE

      - name: Test exact artifacts in Node and Deno
        shell: bash
        run: |
          CORE_TGZ="$GITHUB_WORKSPACE/artifacts/$(node -p "require('./artifacts/core-pack.json').filename")"
          ADAPTER_TGZ="$GITHUB_WORKSPACE/artifacts/$(node -p "require('./artifacts/adapter-pack.json').filename")"
          mkdir "$RUNNER_TEMP/node-consumer" "$RUNNER_TEMP/deno-consumer"
          cp tests/deno-smoke.mjs "$RUNNER_TEMP/node-consumer/smoke.mjs"
          cp tests/deno-smoke.mjs "$RUNNER_TEMP/deno-consumer/deno-smoke.mjs"
          cp tests/deno-types.ts "$RUNNER_TEMP/deno-consumer/deno-types.ts"
          cd "$RUNNER_TEMP/node-consumer"
          npx --yes npm@12.0.1 init --yes
          npx --yes npm@12.0.1 install --ignore-scripts "$CORE_TGZ" "$ADAPTER_TGZ" drizzle-orm@0.45.2
          node smoke.mjs
          docker run --rm -v "$RUNNER_TEMP/node-consumer:/app" -w /app node:22.23.1-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2 node smoke.mjs
          docker run --rm -v "$RUNNER_TEMP/node-consumer:/app" -w /app node:24.18.0-alpine@sha256:a0b9bf06e4e6193cf7a0f58816cc935ff8c2a908f81e6f1a95432d679c54fbfd node smoke.mjs
          docker run --rm -v "$RUNNER_TEMP/node-consumer:/app" -w /app node:26.0.0-alpine@sha256:30f5a66e7265ef70aac56b4753ffa7905e54eca1084bc25503893ad8e9273f05 node smoke.mjs
          cd "$RUNNER_TEMP/deno-consumer"
          npx --yes npm@12.0.1 init --yes
          npx --yes npm@12.0.1 install --ignore-scripts "$CORE_TGZ" "$ADAPTER_TGZ" drizzle-orm@0.45.2 @types/node@22.20.1
          deno check --node-modules-dir=manual deno-types.ts
          deno run --node-modules-dir=manual deno-smoke.mjs

      - name: Upload verified artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-packages
          path: artifacts
          if-no-files-found: error
          retention-days: 14
